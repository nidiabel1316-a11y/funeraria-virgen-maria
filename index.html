const ContractDoc=({u})=>{const[firmaSrc,setFs]=useState(()=>typeof window!=="undefined"&&window.FVM_FIRMA_SRC?window.FVM_FIRMA_SRC:"firma-responsable.png");const onFirmaErr=e=>{if(firmaSrc==="firma-responsable.png"&&!(typeof window!=="undefined"&&window.FVM_FIRMA_SRC))setFs("firma-responsable.svg");else e.currentTarget.style.display="none"};const pl=PLANS.find(p=>p.id===u.pid);const pr=pl?.pr||100000;const planLine=`${u.pl||""} - ${fmt(pr)} COP/mensual`;const ageTit=ageFromBd(u.birthDate);const ben=u.ben||[];const pets=u.pet||[];const illDeclared=ben.filter(b=>b&&String(b.ill||"").trim());const pieFecha=u.cfd?new Date(u.cfd+"T12:00:00").toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"}):"—";return<div className="contract-doc" style={{maxWidth:720,margin:"0 auto",padding:"8px 4px",fontSize:12,lineHeight:1.55,color:TL}}><div className="contract-header" style={{textAlign:"center",marginBottom:16}}><div style={{marginBottom:12}}><Logo s={88} w/></div><h2 className="sf" style={{fontSize:15,color:P,marginBottom:4}}>CONTRATO DE SERVICIOS EXEQUIALES</h2><div style={{fontWeight:700,color:P,fontSize:12}}>{FVM_LEGAL}</div></div><div style={{border:`1px solid ${BD}`,borderRadius:10,padding:14,marginBottom:12,background:"#FDFBF7"}}><div style={{fontSize:11,fontWeight:700,color:P,marginBottom:8}}>DATOS DEL ASOCIADO</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><div style={{fontSize:10,color:TL}}>NOMBRE COMPLETO</div><div style={{fontWeight:600,fontSize:12}}>{(u.nm||"").toUpperCase()}</div></div><div><div style={{fontSize:10,color:TL}}>CÉDULA / DOC.</div><div style={{fontWeight:600,fontSize:12}}>{u.docType||"CC"} {u.doc||"—"}</div></div><div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:TL}}>DIRECCIÓN</div><div style={{fontSize:12}}>{u.address||"—"}{u.city?`, ${u.city}`:""}{u.department?` — ${u.department}`:""}</div></div><div><div style={{fontSize:10,color:TL}}>TELÉFONO</div><div style={{fontSize:12}}>{u.phone||"—"}</div></div><div><div style={{fontSize:10,color:TL}}>EDAD DEL TITULAR</div><div style={{fontSize:12}}>{ageTit!=null?`${ageTit} años`:"—"}</div></div><div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:TL}}>PLAN CONTRATADO</div><div style={{fontWeight:700,color:P,fontSize:12}}>{planLine}</div></div></div></div>{illDeclared.length>0&&<div style={{border:`1px solid #FFB74D`,borderRadius:10,padding:12,marginBottom:12,background:"#FFF8E1"}}><div style={{fontSize:10,fontWeight:700,color:"#E65100",marginBottom:6}}>ENFERMEDADES PERSISTENTES DECLARADAS</div><ul style={{margin:0,paddingLeft:18}}>{illDeclared.map((b,i)=><li key={i} style={{marginBottom:4}}><b>{(b.n||"").trim()}</b>: {String(b.ill||"").trim()}</li>)}</ul></div>}<div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:P,marginBottom:6}}>BENEFICIARIOS REGISTRADOS</div>{ben.length?ben.map((b,i)=><div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${BD}`}}><b>{i+1}</b> {(b.n||"").toUpperCase()}<br/><span style={{fontSize:10}}>{u.docType||"CC"} {b.d||"—"} — {b.r||"—"} — <b>{b.a?`${b.a} años`:"—"}</b></span></div>):<div style={{fontSize:10,color:TL}}>Ninguno registrado.</div>}</div>{pets.length>0&&<div style={{marginBottom:12}}><div style={{fontSize:10,fontWeight:700,color:P,marginBottom:6}}>MASCOTAS INCLUIDAS</div>{pets.map((p,i)=><div key={i} style={{fontSize:10,marginBottom:4}}>{i+1} {(p.n||"").toUpperCase()}{p.b?` — Raza: ${p.b}`:""}{p.a?` — Edad: ${p.a}`:""} — Especie: {p.s||"—"}</div>)}</div>}<div className="contract-clauses" style={{color:TL,maxHeight:520,overflowY:"auto",paddingRight:6,border:`1px solid ${BD}`,borderRadius:8,padding:10,background:"#FAFAFA"}}><div style={{fontWeight:700,color:P,marginBottom:6}}>CLÁUSULAS</div><p style={{marginBottom:8}}><b>PRIMERA — CUOTA DE AFILIACIÓN:</b> Para ser afiliado a la Sociedad &quot;{FVM_LEGAL}&quot;, se debe pagar una cuota por derechos de afiliación y primer mes por la cantidad de CIEN MIL PESOS (100.000,00) en el PLAN ELITE, DOSCIENTOS CINCUENTA MIL (250.000,00) en el PLAN PREMIUM y QUINIENTOS MIL PESOS (500.000,00) en el PLAN PLATINUM. Cabe resaltar que la cuota de afiliación se aumentará cada 1º de Enero, de acuerdo con las condiciones del mercado o la determinación de la Sociedad que eventualmente puede mejorar a sus AFILIADOS al mantener para algunos o para todos de ellos la cuota mensual vigente del año anterior.</p><p style={{marginBottom:8}}><b>SEGUNDA — CUOTA MENSUAL DE MANTENIMIENTO:</b> Cada afiliado pagará una cuota mensual igual a la cuota de afiliación y primer mes mientras quiera seguir con la afiliación, asimismo, esta cuota se aumentará cada año a partir del 1º de Enero, según las condiciones del mercado y las determinaciones que al respecto tome la {FVM_LEGAL}.</p><p style={{marginBottom:8}}><b>TERCERA:</b> Al estar al día con la cuota mensual, el afiliado recibirá los beneficios del plan al que se encuentre afiliado. Cabe resaltar que estos beneficios son intransferibles y solo beneficiarán al cliente inscrito con el que se firma el contrato y a sus beneficiarios debidamente identificados y registrados, quienes también deben estar inscritos en el contrato de prestación de servicios exequiales.</p><p style={{marginBottom:8}}><b>CUARTA — PLANES Y PRECIOS:</b> La &quot;{FVM_LEGAL}&quot; ofrece tres planes diferentes:</p><p style={{marginBottom:8}}><b>a) PLAN ELITE:</b> El cotizante y sus beneficiarios podrán acceder sin limitaciones a los servicios siguientes: el cotizante más cuatro personas hasta los 65 años, incluyendo padres, hijos, nietos y cónyuge; cofre tipo plan o cofre para cenizas (en caso de cremación); preparación del cuerpo; trámites eclesiásticos y civiles; implementos de velación; transporte del cuerpo del municipio donde se encuentre a otro lugar de destino, se cubre 120 kilómetros a partir de esto se cobra por cada kilómetro; cortejo fúnebre; sala de velación por 10 horas en la sala de velación de la empresa o con la que estas tengan convenio; recordatorios; cinta; dos ramos de flores; un automóvil para la familia y un bus para los acompañantes. Cabe resaltar que no se cubre el destino final, ya que eso es directamente con terceros.</p><p style={{marginBottom:8}}><b>b) PLAN PREMIUM:</b> El COTIZANTE y sus BENEFICIARIOS podrán acceder sin limitaciones a los siguientes servicios: El cotizante y hasta 8 beneficiarios menores de 65 años, incluyendo padres hasta los 79 años (cubiertos al 50%), cónyuge, hermanos, nietos, cuñados, yernos, tíos y una mascota de entre 6 meses y 8 años. Además, se incluye un Cofre tipo plan o Cofre para cenizas (en caso de cremación), preparación del cuerpo, trámites eclesiásticos y civiles, implementos de velación, transporte del cuerpo desde el municipio de origen hasta el destino (hasta 135 km cubiertos, luego se cobra por cada kilómetro adicional), cortejo fúnebre, sala de velación por 12 horas (en la sala de velación de la empresa o convenio), recordatorios, cinta, dos ramos de flores, un automóvil para la familia y un bus para los acompañantes (el costo del destino final se debe pagar directamente a terceros).</p><p style={{marginBottom:8}}><b>c) PLAN PLATINUM:</b> El COTIZANTE y sus BENEFICIARIOS podrán acceder sin limitaciones a los siguientes servicios: El cotizante y hasta 10 beneficiarios menores de 65 años, incluyendo padres hasta los 79 años, cónyuge, hermanos, nietos, cuñados, yernos, tíos, un amigo hasta los 35 años y cuatro mascotas de entre 6 meses y 8 años (se excluyen mascotas como caballos y similares, grandes felinos y animales exóticos que pesen más de 50 kilos). Se cubre el 50% del plan a personas con enfermedades terminales de cualquier edad. Además, se incluye un Cofre tipo plan o Cofre para cenizas (en caso de cremación), preparación del cuerpo, trámites eclesiásticos y civiles, implementos de velación, transporte del cuerpo desde el municipio de origen hasta el destino (hasta 150 km cubiertos, luego se cobra por cada kilómetro adicional), cortejo fúnebre, sala de velación por 15 horas (en la sala de velación de la empresa o convenio), recordatorios, cinta, dos ramos de flores, un automóvil para la familia y hasta dos buses para los acompañantes (el costo del destino final se debe pagar directamente a terceros).</p><p style={{marginBottom:8}}><b>QUINTA:</b> Si un afiliado se retira por atraso en las cuotas mensuales o por retiro voluntario, para volver a ser miembro de la Sociedad &quot;{FVM_LEGAL}&quot; deberá pagar la cuota de afiliación vigente y esperar 15 días calendario para recuperar sus derechos y beneficios.</p><p style={{marginBottom:8}}><b>SEXTA:</b> Todos los servicios ofrecidos en el PLAN EXEQUIAL son proporcionados directamente por la Sociedad &quot;{FVM_LEGAL}&quot; o por una entidad de igual o mayor prestigio que tenga convenio y que haya sido contratada directamente por la Sociedad. No se aceptarán servicios contratados por personas naturales o jurídicas distintas.</p><p style={{marginBottom:8}}><b>SÉPTIMA:</b> La falta de pago en dos cuotas mensuales consecutivas se cancela el contrato con la entidad &quot;{FVM_LEGAL}&quot;, al ponerse a paz y salvo recupera sus derechos en los términos de la CLÁUSULA QUINTA.</p><p style={{marginBottom:8}}><b>OCTAVA:</b> La Sociedad &quot;{FVM_LEGAL}&quot; se abroga el derecho de modificar, escindir, mejorar y hacer cambios el contrato, sin que los derechos adquiridos puedan invocarse en contra del COTIZANTE y sus BENEFICIARIOS.</p><p style={{marginBottom:8}}><b>NOVENA:</b> La Sociedad &quot;{FVM_LEGAL}&quot; se reserva para ella el DERECHO A MEJORAR CUALQUIER PLAN EXEQUIAL en su cobertura o en sus BENEFICIOS O INCENTIVOS ECONÓMICOS para el COTIZANTE y sus BENEFICIARIOS. Esto se hará previa autorización de la Sociedad &quot;{FVM_LEGAL}&quot;.</p><p style={{marginBottom:8}}><b>DÉCIMA:</b> La &quot;{FVM_LEGAL}&quot; será la dueña a título de cesión de los derechos de autor de todo el contenido audiovisual, imagen y demás material de todos y cada uno de los servicios que presta y de igual manera se abroga el derecho de realizar todos los cambios necesarios en el presente contrato previa publicación en la página Web de la FUNERARIA LA VIRGEN MARIA SAS.</p></div><p className="contract-sign-note" style={{fontSize:12,marginTop:12,marginBottom:6}}>En señal de consentimiento y mutuo acuerdo firman:</p><p className="contract-sign-note" style={{fontSize:12,marginBottom:16}}>Lo leído en el presente contrato es aceptado por las partes que lo firman en señal de aceptación:</p><div className="contract-sig-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gridTemplateRows:"minmax(88px,auto) auto auto",columnGap:24,rowGap:0,marginTop:22}}><div style={{gridColumn:1,gridRow:1,minHeight:88}} /><div style={{gridColumn:2,gridRow:1,minHeight:88,display:"flex",alignItems:"flex-end",justifyContent:"center",boxSizing:"border-box"}}><img src={firmaSrc} alt="Firma del responsable de la funeraria" style={{maxHeight:76,maxWidth:300,width:"auto",height:"auto",objectFit:"contain"}} onError={onFirmaErr}/></div><div style={{gridColumn:1,gridRow:2,borderTop:"2px solid #333",minHeight:1}} /><div style={{gridColumn:2,gridRow:2,borderTop:"2px solid #333",minHeight:1}} /><div style={{gridColumn:1,gridRow:3,textAlign:"center",paddingTop:10}}><div style={{fontSize:12,color:"#333",fontWeight:600}}>El tomador del plan</div><div style={{fontSize:12,color:TL}}>{u.docType||"CC"} {u.doc||"—"}</div></div><div style={{gridColumn:2,gridRow:3,textAlign:"center",paddingTop:10}}><div style={{fontSize:12,color:"#333",fontWeight:600}}>El responsable de la funeraria</div><div style={{fontSize:12,color:TL}}>NIT: {FVM_NIT}</div><div style={{fontSize:11,color:TL,marginTop:4}}>{FVM_LEGAL}</div></div></div><div className="contract-footer-print" style={{marginTop:22,paddingTop:12,borderTop:`1px solid ${BD}`,textAlign:"center",fontSize:11,color:TL,lineHeight:1.45}}>Documento generado el <b>{pieFecha}</b>  ·  Contrato de servicios exequiales  ·  {FVM_LEGAL}</div></div>};

const ContractReqBlock=({u,sTo})=>{const[note,setN]=useState("");const[ld,setL]=useState(false);const[ben,setBen]=useState([]);const[pet,setPet]=useState([]);useEffect(()=>{setBen(JSON.parse(JSON.stringify(Array.isArray(u.ben)?u.ben:[])));setPet(JSON.parse(JSON.stringify(Array.isArray(u.pet)?u.pet:[])));},[u.uid]);const uB=(i,k,v)=>{const x=[...ben];x[i]={...x[i],[k]:v};setBen(x);};const uP=(i,k,v)=>{const x=[...pet];x[i]={...x[i],[k]:v};setPet(x);};const pl=PLANS.find(p=>p.id===u.pid);const rl=pl?.rl||[];const maxB=pl?.mb??0;const maxP=pl?.mp??0;const addB=()=>{if(ben.length>=maxB)return;setBen([...ben,{n:"",r:"",a:"",d:"",ill:""}]);};const addP=()=>{if(pet.length>=maxP)return;setPet([...pet,{n:"",s:"",a:""}]);};const rmB=i=>setBen(ben.filter((_,j)=>j!==i));const rmP=i=>setPet(pet.filter((_,j)=>j!==i));return<div className="no-print" style={{marginBottom:18,padding:14,background:"#E8F5E9",borderRadius:10,border:"1px solid #81C784"}}><div style={{fontSize:12,fontWeight:700,color:P,marginBottom:6}}>Solicitar cambio de beneficiarios o mascotas</div><p style={{fontSize:10,color:TL,marginBottom:10,lineHeight:1.45}}>Edita, agrega o quita filas según tu plan; envía la solicitud. El <b>administrador</b> debe aprobarla para que quede en tu contrato.</p><div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}><button type="button" className="bo" onClick={addB} disabled={ben.length>=maxB} style={{fontSize:11}}>+ Beneficiario ({ben.length}/{maxB})</button><button type="button" className="bo" onClick={addP} disabled={pet.length>=maxP} style={{fontSize:11}}>+ Mascota ({pet.length}/{maxP})</button></div>{ben.map((b,i)=><div key={i} style={{marginBottom:10,padding:10,background:"#fff",borderRadius:8,border:`1px solid ${BD}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:9,fontWeight:700,color:P}}>Beneficiario {i+1}</div><button type="button" className="ba" onClick={()=>rmB(i)} style={{fontSize:9,padding:"2px 8px"
